name: gowai
description: "Gowai — AI Travel Planner powered by Claude AI"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_maps_flutter: ^2.5.3
  flutter_riverpod: ^2.4.10
  supabase_flutter: ^2.3.4
  http: ^1.2.0
  flutter_dotenv: ^5.1.0
  cached_network_image: ^3.3.1
  flutter_cache_manager: ^3.4.1
  lottie: ^3.1.0
  go_router: ^13.2.0
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.5
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  animated_text_kit: ^4.2.2
  intl: ^0.19.0
  purchases_flutter: ^8.0.0
  # Kept for the planned social-login feature (login screen advertises it):
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  package_info_plus: ^8.0.0
  upgrader: ^10.3.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/lottie/
    - assets/images/
